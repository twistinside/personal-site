name: Deploy Site

on:
  push:
    branches: [ mainline ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload to Porkbun
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: pixie-ftp.porkbun.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          dangerous-clean-slate: true

      - name: Notify via Pushover
        if: ${{ always() && env.PUSHOVER_TOKEN != '' && env.PUSHOVER_USER != '' }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          JOB_STATUS: ${{ job.status }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ "${JOB_STATUS}" = "success" ]; then
            title="Twistinside deployment"
            message="Deployment complete for ${REF_NAME} @ ${GIT_SHA}"
          else
            title="Twistinside deployment failed"
            message="Deployment failed for ${REF_NAME} @ ${GIT_SHA}. Check logs."
          fi
          curl -s \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "title=${title}" \
            --form-string "message=${message}" \
            https://api.pushover.net/1/messages.json
